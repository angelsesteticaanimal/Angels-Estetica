let db=null,online=false;const KEY='angels_v12_local';
async function init(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();online=true}catch(e){}}
function selecionarServicoUrl(){const p=new URLSearchParams(location.search);const serv=p.get('servico');if(serv){const sel=document.querySelector('select[name="servico"]');if(sel){for(const opt of sel.options){if(opt.value.toLowerCase()===serv.toLowerCase()){sel.value=opt.value;break}}}let aviso=document.getElementById('servicoEscolhido');if(aviso){aviso.textContent='Serviço selecionado: '+serv;aviso.classList.remove('hidden')}}}
