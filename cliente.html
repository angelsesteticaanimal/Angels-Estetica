n.active{color:var(--rose)}.empty{text-align:center;color:var(--muted);padding:22px}.msg-preview{white-space:pre-wrap;background:#fff8f5;border:1px dashed var(--border);border-radius:18px;padding:14px;font-size:14px;line-height:1.4}@media(min-width:800px){body{padding-bottom:0}.header{margin:18px 18px 0;border-radius:32px}.hero{margin:-70px 34px 18px}.content{padding:0 34px 34px}.stats{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:repeat(4,1fr)}.bottom-nav{left:50%;transform:translateX(-50%);max-width:740px;border-radius:26px 26px 0 0}}
