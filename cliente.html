al;font-size:22px}.bottom-nav button.active{color:var(--rose)}.empty{text-align:center;color:var(--muted);padding:22px}@media(min-width:800px){body{padding-bottom:0}.header{margin:18px 18px 0;border-radius:32px}.hero{margin:-70px 34px 18px}.content{padding:0 34px 34px}.stats{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:repeat(4,1fr)}.booking-actions{grid-template-columns:repeat(5,1fr)}.bottom-nav{left:50%;transform:translateX(-50%);max-width:740px;border-radius:26px 26px 0 0}}
