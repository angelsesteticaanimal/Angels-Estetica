<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solicitar Agendamento - Angels</title><style>

us:16px;padding:13px 15px;font-weight:800;background:var(--rose-soft);color:var(--rose-dark)}.list{display:flex;flex-direction:column;gap:12px}.booking{border:1px solid #f1ddd9;border-radius:22px;padding:14px;background:#fff}.booking-top{display:flex;justify-content:space-between;gap:10px}.booking h4{margin:0;font-size:18px}.booking p{margin:5px 0;color:var(--muted);font-size:14px}.badge{padding:7px 11px;border-radius:999px;font-weight:800;font-size:12px;white-space:nowrap}.Pendente{background:#fff0d5;color:#9a5d00}.Confirmado{background:#e4f3e6;color:#3b7a45}.Cancelado{background:#ffe2e7;color:#b73545}.Concluído{background:#e8e4ff;color:#6254a5}.Atendimento{background:#e4efff;color:#2362b7}.booking-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.booking-actions button{border:1px solid #ead4d0;background:white;border-radius:14px;padding:10px;font-weight:700}.ok{color:var(--green)}.no{color:var(--red)}.wa{color:#128c7e}form{display:flex;flex-direction:column;gap:13px}label{font-weight:800;display:flex;flex-direction:column;gap:7px}input,select,textarea{border:1px solid #ead4d0;border-radius:16px;padding:14px;outline:none;background:#fff}textarea{min-height:100px}.checkbox{flex-direction:row;align-items:center}.checkbox input{width:20px;height:20px}.notice{background:#fff7e6;border:1px solid #f2d79b;color:#7a5200;padding:12px;border-radius:16px;margin:12px 0;font-size:14px}.success{background:#eaf7ec;border:1px solid #bfe3c4;color:#276232;padding:12px;border-radius:16px;margin:12px 0;font-size:14px}.hidden{display:none!important}.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.96);border-top:1px solid var(--border);padding:8px 6px 10px;box-shadow:0 -10px 24px rgba(69,45,40,.08)}.bottom-nav button{border:0;background:transparent;color:#9d8982;font-weight:800;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px}.bottom-nav i{font-style:normal;font-size:22px}.bottom-nav button.active{color:var(--rose)}.empty{text-align:center;color:var(--muted);padding:22px}@media(min-width:800px){body{padding-bottom:0}.header{margin:18px 18px 0;border-radius:32px}.hero{margin:-70px 34px 18px}.content{padding:0 34px 34px}.stats{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:repeat(4,1fr)}.booking-actions{grid-template-columns:repeat(5,1fr)}.bottom-nav{left:50%;transform:translateX(-50%);max-width:740px;border-radius:26px 26px 0 0}}
</style></head><body><div class="app"><header class="header"><div class="top"><div class="brand"><img class="logo-mini" src="assets/icon-192.png" alt="Angels"><div><h1>ANGELS</h1><p>Solicitar agendamento</p></div></div></div></header><section class="hero"><img src="assets/angels-logo.jpg" alt="Logo Angels"><h2>Agende o cuidado do seu pet</h2><p>Preencha os dados. Confirmaremos pelo WhatsApp.</p><div id="okMsg" class="success hidden">Solicitação enviada com sucesso!</div></section><main class="content"><div class="panel"><h3>Solicitação do Cliente</h3><form id="clientRequestForm"><label>Nome do tutor<input required name="tutor"></label><label>WhatsApp<input required name="whatsapp"></label><label>Nome do pet<input required name="pet"></label><label>Raça<input name="raca"></label><label>Serviço<select required name="servico"><option value="">Selecione</option><option>Banho</option><option>Tosa</option><option>Banho e Tosa</option><option>Hidratação</option><option>Corte de Unhas</option><option>Clubinho</option></select></label><label>Porte<select name="porte"><option>Pequeno</option><option>Médio</option><option>Grande</option></select></label><label>Data desejada<input required name="data" type="date"></label><label>Horário desejado<input required name="hora" type="time"></label><label class="checkbox"><input name="busca" type="checkbox">Precisa de busca e entrega?</label><label>Observações<textarea name="obs"></textarea></label><button class="primary" type="submit">Enviar solicitação</button></form></div></main></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script><script src="cliente.js"></script></body></html>
