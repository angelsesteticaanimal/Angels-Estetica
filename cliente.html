<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solicitar Agendamento - Angels</title><link rel="stylesheet" href="styles.css"></head><body><div class="app"><header class="header"><div class="top"><div class="brand"><img class="logo-mini" src="assets/icon-192.png" alt="Angels"><div><h1>ANGELS</h1><p>Solicitar agendamento</p></div></div></div></header><section class="hero"><img src="assets/angels-logo.jpg" alt="Logo Angels"><h2>Agende o cuidado do seu pet</h2><p>Preencha os dados. Confirmaremos pelo WhatsApp.</p><div id="okMsg" class="success hidden">Solicitação enviada com sucesso!</div></section><main class="content"><div class="panel"><h3>Solicitação do Cliente</h3><form id="clientRequestForm"><label>Nome do tutor<input required name="tutor"></label><label>WhatsApp<input required name="whatsapp"></label><label>Nome do pet<input required name="pet"></label><label>Raça<input name="raca"></label><label>Serviço<select required name="servico"><option value="">Selecione</option><option>Banho</option><option>Tosa</option><option>Banho e Tosa</option><option>Hidratação</option><option>Corte de Unhas</option><option>Clubinho</option></select></label><label>Porte<select name="porte"><option>Pequeno</option><option>Médio</option><option>Grande</option></select></label><label>Data desejada<input required name="data" type="date"></label><label>Horário desejado<input required name="hora" type="time"></label><label class="checkbox"><input name="busca" type="checkbox">Precisa de busca e entrega?</label><label>Observações<textarea name="obs"></textarea></label><button class="primary" type="submit">Enviar solicitação</button></form></div></main></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script><script src="cliente.js"></script></body></html>
