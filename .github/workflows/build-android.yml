name: Gerar APK Android
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Instalar dependências
        run: npm install && npm install -D typescript
      - name: Preparar pasta web
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp cliente.html www/
          cp manifest.json www/ || true
          cp icon-192.png www/ || true
          cp icon-512.png www/ || true
      - name: Criar projeto Android
        run: npx cap add android
      - name: Sincronizar arquivos do app
        run: npx cap sync android
      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew
      - name: Gerar APK
        run: cd android && ./gradlew assembleDebug
      - name: Salvar APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: Angels-Estetica-Animal-V11-2-Corrigida-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
